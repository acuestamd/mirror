name: 🐛 Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: true
  - type: dropdown
    id: where
    attributes:
      label: Where
      options:
        - Local dev
        - Self-hosted / Vercel deployment
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Node version, browser, etc."
  - type: checkboxes
    id: no-secrets
    attributes:
      label: Confirmation
      options:
        - label: I have not included any secrets, access tokens, or another person's data in this report.
          required: true
